# v6 — kit-driven reproduction of the v4 pico@416 fixed-policy baseline.
#
# v4 number to beat (within +/- 0.01 AP for the pivot to count as successful):
#   AP_simplified_test = 0.406  (deimv2_pico_tile_g2_fixed_416x416)
#
# All training/eval/export is done by kwcoco-detector-kit. This recipe is
# the only shitspotter-side description of the run. run.sh adds the leading
# `tile` step that produces v6's training kwcoco from the raw splits.
#
# Hyperparameters mirror v4's policy.json for the same cell.
---
schema: recipe.v1
name: shitspotter_v6_pico416_baseline
description: >
  v4 pico@416 fixed baseline reproduction. Validates the
  kwcoco-detector-kit pivot before any quality-pushing technique.

data:
  # Tiled by run.sh from the simplified train/vali splits on
  # /data/joncrall/dvc-repos/shitspotter_dvc/. Quadrant tile mode at
  # grid=2, overlap=0.20, output_dim=640 -- the v4 default.
  train_kwcoco: /data/joncrall/kcd/v6/data/train_tile_g2.kwcoco.zip
  vali_kwcoco:  /data/joncrall/kcd/v6/data/vali_tile_g2.kwcoco.zip
  # v9 simplified test GT (the canonical eval target).
  test_kwcoco:  /data/joncrall/dvc-repos/shitspotter_expt_dvc/foundation_detseg_v3/v9/detector_prepared/test.simplified.kwcoco.zip

workspace:
  kcd_root: /data/joncrall/kcd/v6

sweep:
  trainer: deimv2
  category_names: poop
  matrix:
    - variant: deimv2_pico
      input_hw: [416, 416]
      train_policy: fixed
  # COCO-pretrained DEIMv2-pico checkpoint. Required for parity with v4 --
  # the v4 baseline (AP=0.406) fine-tuned from this; training from scratch
  # (init_checkpoint omitted) loses 5-10 AP on this dataset size.
  init_checkpoint: /data/joncrall/shitspotter_v4/pretrained/deimv2/deimv2_pico_coco.pth
  # Mirrors v4 policy.json for deimv2_pico_tile_g2_fixed_416x416:
  #   num_epochs=80, train_batch=48, val_batch=96, lr=7.5e-4,
  #   backbone_lr=3.75e-5, use_amp=True
  num_epochs: 80
  batch_size: 48
  val_batch_size: 96
  lr: 7.5e-4
  backbone_lr: 3.75e-5
  use_amp: true
  scale_tier: M
  num_gpus: 1
  distributed: false
  do_export: true
  do_eval: true
  do_bench: true

eligibility:
  # Walk-and-scan deploy criterion (same as v4): any nonzero FPS is useful,
  # so the gate is permissive. The desktop ms gate keeps obviously-too-heavy
  # cells out of the winner pool.
  max_desktop_ms: 80.0
  min_device_fps: 1.0
  include_smoke_models: false

reproducibility:
  seed: 0
  # Default to non-deterministic for speed. Flip to true for a slower
  # bit-closer reproduction (DEIMv2 may surface unsupported-op errors).
  deterministic: false
