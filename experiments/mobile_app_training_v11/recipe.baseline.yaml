# v11 BASELINE arm — pico at 640x640, human GT only.
#
# Purpose: isolate the *resolution* lever. Identical in shape to v10's pico
# cell (v6.1 corrected bundle, COCO-pretrained init, 120 epochs) except the
# model input is 640x640 instead of 416x416 — pico's *native* DEIMv2
# resolution. v10 pico@416 scored AP@0.5 = 0.478; this measures what the
# extra resolution alone buys, especially on small poops (size-stratified
# eval in EVAL.md).
#
# The distillation arm (recipe.distill.yaml) is identical to this except its
# train_kwcoco points at the human+teacher merged bundle. Keeping epochs /
# lr / init / policy identical across the two arms is deliberate: the ONLY
# variable is the training data, so the AP delta is attributable to
# distillation. (v10 bundled many changes at once and we could not attribute
# anything — see experiments/mobile_app_training_v10.)
---
schema: recipe.v1
name: shitspotter_v11_pico640_baseline
description: >
  v11 baseline: pico@640 (native resolution) on v6.1's corrected human-GT
  tile bundle. Isolates the resolution gain over v10 pico@416 (AP 0.478).

data:
  train_kwcoco: /media/joncrall/flash1/kcd-ssd/v6_1/data/train_tile_g2.kwcoco.zip
  vali_kwcoco:  /media/joncrall/flash1/kcd-ssd/v6_1/data/vali_tile_g2.kwcoco.zip
  test_kwcoco:  /data/joncrall/dvc-repos/shitspotter_expt_dvc/foundation_detseg_v3/v9/detector_prepared/test.simplified.kwcoco.zip
  tile_store: kwcoco_jpeg

workspace:
  kcd_root: /media/joncrall/flash1/kcd-ssd/v11/baseline

sweep:
  trainer: deimv2
  category_names: poop
  matrix:
    - variant: deimv2_pico
      input_hw: [640, 640]
      train_policy: multiscale_512_768
      init_checkpoint: /data/joncrall/shitspotter_v4/pretrained/deimv2/deimv2_pico_coco.pth
  num_epochs: 120
  batch_size: 32
  val_batch_size: 48
  lr: 5.0e-4
  backbone_lr: 2.5e-5
  use_amp: true
  scale_tier: M
  num_gpus: 1
  distributed: false
  do_export: true
  do_eval: true
  do_bench: true

eligibility:
  max_desktop_ms: 80.0
  min_device_fps: 1.0
  include_smoke_models: false

reproducibility:
  seed: 0
  deterministic: false
