# v10 -- best-of-everything ship candidates
#
# Composition:
#   - Source bundle:    v6.1's corrected (10671-image) train + 1258-image vali,
#                       tiled at quadrant g2 / 416 / 640. Same as v7.1.
#   - Tile store:       kwcoco_jpeg (the default). Decision rationale:
#                       v6.1's bundle is being staged on SSD; per
#                       kwcoco_dataloader's 2026-05-29_ssd_cross_storage
#                       journal, webdataset only wins on cold HDD
#                       (~1.7x baseline). On warm SSD it loses ~0.5x
#                       because the WDS pipeline carries ~1.5x per-sample
#                       CPU overhead that doesn't pay back without the
#                       sequential-read win. kwcoco_jpeg is also the
#                       lower-friction path — no shard pre-build step.
#   - Train policy:     v7.1's multiscale (the v7 multiscale gain stacked
#                       cleanly on v6.1's corrected-bundle gain in the
#                       bisect; +0.012 AP at pico).
#   - Init:             v4 COCO-pretrained DEIMv2 .pth files. Same as v7.1.
#   - Epoch count:      120 (1.5x v7.1's 80). README says "1.5-2x the
#                       best round". Bump to 160 if v8/v9 finalize and
#                       suggest the loss curve was still descending.
#   - EMA:              implicit (DEIMv2 default; predictor reads from
#                       state['ema']['module'] in find_checkpoint).
#
# Pending integrations (not blocking v10's first cut):
#   - v8 mining round count: if v8/EVAL.md shows mining was a net win
#     for the corrected bundle, add a `resume:` field pointing at a
#     mined checkpoint and crank epochs further on top.
#   - v9 distillation:       once v9 evaluates, the v9-distilled student
#     checkpoint becomes the better init than _coco.pth. Repoint
#     init_checkpoint at the v9 student package.
#
# Storage prerequisite:
#   v6.1's train + vali tile bundles must be copied to the writable SSD
#   at /media/joncrall/flash1/kcd-ssd/v6_1/data/ before launching v10.
#   The kcd_root workspace also lives on the SSD so checkpoint writes
#   are fast.
#
#   Copy from the HDD-backed staging:
#     mkdir -p /media/joncrall/flash1/kcd-ssd/v6_1
#     rsync -aP /data/joncrall/kcd/v6_1/data /media/joncrall/flash1/kcd-ssd/v6_1/
#
#   test_kwcoco stays on shitspotter_expt_dvc (read-only DVC mount;
#   eval happens once at end-of-run, throughput doesn't matter).
#   Init checkpoints stay on /data/joncrall/shitspotter_v4/ (read-only).
---
schema: recipe.v1
name: shitspotter_v10_ship_candidates
description: >
  v10 best-of-everything: v6.1 corrected bundle + v7.1 multiscale +
  120-epoch budget on SSD-backed kwcoco_jpeg. First defensible
  +5-AP-over-v4 ship candidate for both mobile cells.

data:
  # v6.1's corrected (v4-equivalent, train_imgs10671-derived) tile bundles
  # copied to SSD. ~53K train tiles / ~22.6K annotations / ~11.6K vali tiles.
  train_kwcoco: /media/joncrall/flash1/kcd-ssd/v6_1/data/train_tile_g2.kwcoco.zip
  vali_kwcoco:  /media/joncrall/flash1/kcd-ssd/v6_1/data/vali_tile_g2.kwcoco.zip
  test_kwcoco:  /data/joncrall/dvc-repos/shitspotter_expt_dvc/foundation_detseg_v3/v9/detector_prepared/test.simplified.kwcoco.zip
  # tile_store defaults to kwcoco_jpeg — no need to set explicitly,
  # but documenting it here so future readers see the deliberate choice.
  tile_store: kwcoco_jpeg

workspace:
  # Workspace on SSD too — DEIMv2 writes checkpoints + tfevents every
  # few minutes; doing that to a warm SSD vs the HDD pool keeps the
  # training loop from blocking on flush.
  kcd_root: /media/joncrall/flash1/kcd-ssd/v10

sweep:
  trainer: deimv2
  category_names: poop
  matrix:
    - variant: deimv2_pico
      input_hw: [416, 416]
      train_policy: multiscale_320_512
      init_checkpoint: /data/joncrall/shitspotter_v4/pretrained/deimv2/deimv2_pico_coco.pth
    - variant: deimv2_n
      input_hw: [640, 640]
      train_policy: multiscale_512_768
      init_checkpoint: /data/joncrall/shitspotter_v4/pretrained/deimv2/deimv2_n_coco.pth
  num_epochs: 120
  batch_size: 32
  val_batch_size: 48
  lr: 5.0e-4
  backbone_lr: 2.5e-5
  use_amp: true
  scale_tier: M
  num_gpus: 1
  distributed: false
  do_export: true
  do_eval: true
  do_bench: true

eligibility:
  max_desktop_ms: 80.0
  min_device_fps: 1.0
  include_smoke_models: false

reproducibility:
  seed: 0
  deterministic: false
